name: ✨ 기능 추가
description: 새로운 기능이나 개선 사항을 제안합니다.
title: '[FEATURE] '
labels: ['enhancement']
body:
  - type: textarea
    id: background
    attributes:
      label: "💡 제안 배경"
      placeholder: "왜 필요한 기능인가요?"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: "🧩 제안 내용"
      placeholder: "구체적인 기능 설명"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "🚀 기대 동작"
      placeholder: "추가 후 기대 효과"
  - type: checkboxes
    id: frameworks
    attributes:
      label: "🛠 적용 프레임워크"
      options:
        - label: "React"
        - label: "Vue 3"
        - label: "공통 (Shared Logic)"
  - type: checkboxes
    id: platforms
    attributes:
      label: "🌐 적용 대상 브라우저"
      options:
        - label: "Chrome / Edge (Chromium)"
        - label: "Firefox"
        - label: "Safari"
        - label: "Mobile Web (iOS)"
        - label: "Mobile Web (Android)"
